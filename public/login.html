<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodent - Admin Login</title>

<style>
:root {
    --gold-primary: #bfa15f;
    --gold-light: #f3e5ab;
    --gold-dark: #8a6f3e;
    --black-accent: #0a0a0a;
    --bg-light: #fafafa;
    --text-dark: #1a1a1a;
    --text-muted: #555555;
    --input-border: rgba(186, 161, 95, 0.25);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    background-color: var(--bg-light);
    color: var(--text-dark);
    position: relative;
    padding: 20px;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: 
        linear-gradient(to right, rgba(186, 161, 95, 0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(186, 161, 95, 0.02) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(circle at center, black 70%, transparent 100%);
    -webkit-mask-image: radial-gradient(circle at center, black 70%, transparent 100%);
    z-index: 1;
}

.login-card {
    width: 100%;
    max-width: 420px;
    padding: 40px 30px;
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 4px;
    box-shadow: 0 40px 90px rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(186, 161, 95, 0.1);
    text-align: center;
    animation: premiumReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes premiumReveal {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -1px;
    color: var(--black-accent);
    line-height: 1.1;
}

.line {
    width: 50px;
    height: 2px;
    background: var(--gold-primary);
    margin: 15px auto 25px auto;
}

.subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 30px;
    font-weight: 400;
}

.input-group {
    margin-bottom: 20px;
    text-align: left;
}

input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 2px;
    border: 1px solid var(--input-border);
    background: #ffffff;
    color: var(--text-dark);
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
}

input:focus {
    border-color: var(--black-accent);
    box-shadow: 0 0 0 3px rgba(186, 161, 95, 0.15);
}

button {
    width: 100%;
    border: 1px solid var(--black-accent);
    padding: 14px 34px;
    background: var(--black-accent);
    color: white;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    margin-top: 10px;
}

button:hover {
    background: transparent;
    color: var(--black-accent);
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

.back-home {
    display: inline-block;
    margin-top: 25px;
    text-decoration: none;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    transition: color 0.3s ease;
}

.back-home:hover {
    color: var(--gold-dark);
}
</style>
</head>
<body>

<div class="login-card">
    <h1>Admin Login</h1>
    <div class="line"></div>
    <p class="subtitle">Enter your clinic administration credentials below.</p>
    
    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="loginInput" placeholder="Username or Email" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit">Secure Log In</button>
    </form>
    
    <a href="/" class="back-home">← Return to Homepage</a>
</div>

<script>
// 🌟 SMART AUTO-REDIRECT: If already authorized, instantly bypass login page
if (localStorage.getItem("biodent_admin") === "true") {
    if (window.location.protocol === "file:") {
        window.location.href = "admin.html"; 
    } else {
        window.location.href = "/admin"; 
    }
}

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    
    const loginInput = document.getElementById("loginInput").value;
    const password = document.getElementById("password").value;

    const myUsername = "admin"; 
    const myEmail = "info@biodent.com";
    const myPersonalPassword = "BiodentSecure2026"; 

    if ((loginInput === myUsername || loginInput === myEmail) && password === myPersonalPassword) {
        localStorage.setItem("biodent_admin", "true");
        
        if (window.location.protocol === "file:") {
            window.location.href = "admin.html"; 
        } else {
            window.location.href = "/admin"; 
        }
    } else {
        alert("❌ Invalid Username/Email or Password!");
    }
});
</script>

</body>
</html>
