<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodent</title>

<style>
:root {
    --gold-primary: #c5a85c;
    --gold-dark: #9a7e38;
    --gold-light: #f4ebd0;
    --black-true: #0a0a0a;
    --black-matte: #1a1a1a;
    --white-pure: #ffffff;
    --white-soft: #fcfcfc;
    --line-subtle: rgba(197, 168, 92, 0.2);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    min-height: 100vh;
    background-color: var(--white-pure);
    color: var(--black-matte);
    position: relative;
    overflow-x: hidden;
}

/* Luxury Editorial Geometric Background Details */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: 
        linear-gradient(to right, rgba(10, 10, 10, 0.015) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(197, 168, 92, 0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 0;
    pointer-events: none;
}

/* Subtle gold ambient glow in the background corner */
body::after {
    content: "";
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(197, 168, 92, 0.04) 0%, transparent 70%);
    top: -100px;
    right: -200px;
    z-index: 0;
    pointer-events: none;
}

/* HERO CONTAINER */
.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
    padding: 40px 20px 80px 20px;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
}

/* DETAILED MINIMALIST NAVIGATION */
nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 6px;
    background: var(--white-soft);
    border: 1px solid var(--black-true);
    position: relative;
    margin-bottom: 70px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
}

/* Fine structural line behind the navigation for detail */
nav::after {
    content: '';
    position: absolute;
    inset: -4px;
    border: 1px solid var(--gold-primary);
    pointer-events: none;
    opacity: 0.5;
}

nav a {
    text-decoration: none;
    color: var(--black-matte);
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

nav a:hover {
    background: var(--black-true);
    color: var(--white-pure);
}

/* HEADER BRAND CONTENT */
.hero-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 50px;
    margin-bottom: 80px;
    width: 100%;
    position: relative;
}

.logo {
    width: 240px;
    height: auto;
    padding: 15px;
}

.hero-text {
    text-align: left;
    position: relative;
    padding-left: 25px;
    border-left: 2px solid var(--gold-primary);
}

.welcome {
    color: var(--gold-dark);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
}

.clinic {
    color: var(--black-true);
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 8px;
    line-height: 1.2;
}

.brand {
    font-size: clamp(54px, 7vw, 84px);
    font-weight: 800;
    color: var(--black-true);
    letter-spacing: -2px;
    line-height: 0.95;
    margin-top: 5px;
    position: relative;
}

/* TAGLINE SECTION */
.tagline {
    text-align: center;
    max-width: 1050px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.tagline h2 {
    font-size: clamp(34px, 5vw, 56px);
    font-weight: 300;
    color: var(--black-true);
    letter-spacing: -1px;
    line-height: 1.15;
    margin-bottom: 25px;
}

.gold {
    color: var(--gold-primary);
    position: relative;
    display: inline-block;
}

/* Subtle underlying aesthetic block details */
.gold::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--gold-primary);
}

.tagline p {
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1.75;
    max-width: 760px;
    margin-bottom: 60px;
}

/* ASYMMETRIC CHIC PHOTO GALLERY GRID */
.photo-gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    width: 100%;
    margin-bottom: 70px;
}

.gallery-wrapper {
    position: relative;
    background: var(--white-soft);
    padding: 10px;
    border: 1px solid rgba(0, 0, 0, 0.05);
    box-shadow: 0 15px 40px rgba(0,0,0,0.03);
    transition: transform 0.4s ease;
}

/* Delicate geometric accent lines surrounding each image element container */
.gallery-wrapper::before {
    content: '';
    position: absolute;
    top: -6px;
    left: -6px;
    width: 15px;
    height: 15px;
    border-top: 1.5px solid var(--gold-primary);
    border-left: 1.5px solid var(--gold-primary);
}

.gallery-wrapper::after {
    content: '';
    position: absolute;
    bottom: -6px;
    right: -6px;
    width: 15px;
    height: 15px;
    border-bottom: 1.5px solid var(--gold-primary);
    border-right: 1.5px solid var(--gold-primary);
}

.gallery-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
    filter: grayscale(15%);
    transition: all 0.5s ease;
    border: 1px solid var(--black-true);
}

.gallery-wrapper:hover {
    transform: translateY(-5px);
}
.gallery-wrapper:hover .gallery-img {
    filter: grayscale(0%);
}

/* HIGH-CONTRAST CHIC CTA BUTTON */
.book-btn {
    display: inline-block;
    text-decoration: none;
    padding: 18px 45px;
    background: var(--black-true);
    color: var(--white-pure);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid var(--black-true);
    position: relative;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    margin-top: 20px;
}

/* Secondary tracking element line for maximum high-detail presentation */
.book-btn::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--gold-primary);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.book-btn:hover {
    background: var(--white-pure);
    color: var(--black-true);
    box-shadow: 0 15px 35px rgba(197, 168, 92, 0.15);
    transform: translateY(-3px);
}

.book-btn:hover::before {
    border-color: var(--black-true);
    inset: -1px;
}

/* RESPONSIVE DESIGN FOR MEDIUM & MOBILE SCREEN SIZES */
@media(max-width:950px){
    .hero-content {
        flex-direction: column;
        text-align: center;
        gap: 30px;
        margin-bottom: 50px;
    }

    .hero-text {
        text-align: center;
        padding-left: 0;
        border-left: none;
    }
    
    .hero-text::before {
        content: '';
        display: block;
        width: 40px;
        height: 2px;
        background: var(--gold-primary);
        margin: 0 auto 15px auto;
    }

    .photo-gallery-grid {
        grid-template-columns: 1fr;
        gap: 40px;
        max-width: 500px;
        margin-bottom: 50px;
    }
    
    nav {
        margin-bottom: 50px;
    }
}


</style>
</head>
<body>

<section class="hero">

    <nav>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/appointments">Appointment</a>
        <a href="/login">Login</a>
    </nav>

    <div class="hero-content">
        <img src="dhomi(1).png" alt="Biodent Logo" class="logo">

        <div class="hero-text">
            <div class="welcome">Welcome to</div>
            <div class="clinic">KLINIKA DENTARE</div>
            <div class="brand">BIODENT</div>
        </div>
    </div>

    <div class="tagline">
        <h2>Your smile is <span class="gold">our priority.</span></h2>

        <p>
            At Biodent, we combine modern dental technology,
            professional expertise, and personalized care to
            help every patient achieve a healthier and brighter smile.
        </p>

        <div class="photo-gallery-grid">
            <div class="gallery-wrapper">
                <img src="doktorri.jpg" alt="Clinic Practice Specialist" class="gallery-img">
            </div>
            <div class="gallery-wrapper">
                <img src="hanadhomi.jpg" alt="Advanced Dentistry Environment" class="gallery-img">
            </div>
            <div class="gallery-wrapper">
                <img src="goja.jpg" alt="Oral Optimization Precision" class="gallery-img">
            </div>
        </div>

        <a href="/appointments" class="book-btn">
            Book Appointment
        </a>
    </div>

</section>

</body>
</html>
